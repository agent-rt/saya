name: Saya
options:
  bundleIdPrefix: app
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.4.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Saya:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: ../../bindings/saya.swift
        group: Bindings
      - path: Resources/AppIcon.icns
        group: Resources
    dependencies:
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_NAME: Saya
        PRODUCT_BUNDLE_IDENTIFIER: app.saya
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_OBJC_BRIDGING_HEADER: $(SRCROOT)/../../bindings/sayaFFI.h
        # Pass the staticlib (.a) directly via full path so the linker
        # cannot pick up the cdylib that cargo also produces for bindgen.
        # SAYA_FFI_STATICLIB is set per-config below.
        OTHER_LDFLAGS:
          - "$(SAYA_FFI_STATICLIB)"
          - "-framework AppKit"
          - "-framework CoreServices"
          - "-framework Metal"
          - "-framework MetalKit"
          - "-framework MetalPerformanceShaders"
          - "-framework MetalPerformanceShadersGraph"
          - "-framework Accelerate"
          - "-framework Security"
          - "-framework SystemConfiguration"
          - "-lc++"
      configs:
        Debug:
          SAYA_FFI_STATICLIB: $(SRCROOT)/../../target/debug/libsaya_ffi.a
        Release:
          SAYA_FFI_STATICLIB: $(SRCROOT)/../../target/release/libsaya_ffi.a
    preBuildScripts:
      - name: "Build saya-ffi staticlib"
        basedOnDependencyAnalysis: false
        script: |
          set -e
          cd "${SRCROOT}/../.."
          PROFILE_ARG=""
          [ "${CONFIGURATION}" = "Release" ] && PROFILE_ARG="--release"
          if [ ! -f bindings/saya.swift ] || [ ! -f bindings/sayaFFI.h ]; then
              ./scripts/bindgen.sh
          fi
          cargo build $PROFILE_ARG -p saya-ffi --features embedding
